
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Bhauja</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4,#ffdde1);
font-family:Arial;
overflow:hidden;
}

/* Glass Card */

.card{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(15px);
padding:40px;
border-radius:20px;
text-align:center;
box-shadow:0 8px 30px rgba(0,0,0,0.2);
}

/* Title */

h1{
color:white;
font-size:40px;
margin-bottom:10px;
}

/* Gift */

.gift{
font-size:90px;
cursor:pointer;
transition:transform 0.5s;
}

.gift:hover{
transform:scale(1.2) rotate(10deg);
}

/* Photo */

.photo{
display:none;
margin-top:20px;
animation:fade 1.5s ease;
}

.photo img{
width:260px;
border-radius:20px;
box-shadow:0 0 25px pink;
}

@keyframes fade{
from{opacity:0;transform:scale(0.8);}
to{opacity:1;transform:scale(1);}
}

/* Floating hearts */

.heart{
position:absolute;
font-size:18px;
color:#ff4d6d;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Happy Birthday Bhauja 🎉</h1>

<p>Click the gift for a surprise 🎁</p>

<div id="gift" class="gift" onclick="openGift()">🎁</div>

<div id="photo" class="photo">
<img src="ChatGPT Image Mar 14, 2026, 08_37_16 PM.png">
</div>

</div>

<script>

/* Gift open */

function openGift(){

document.getElementById("gift").innerHTML="💖";

document.getElementById("photo").style.display="block";

}

/* Floating hearts */

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️ Seema";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(createHeart,400);

</script>

</body>
</html>
